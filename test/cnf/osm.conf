# OSM engine configuration
#
# Sources are named PMTiles v3 files. The name is used in Dali layer
# configuration to select a data source.
#
# Data setup (one-time):
#
#   # Generate Scandinavia MVT tiles from osm2pgsql output:
#   tilemaker --input scandinavia-latest.osm.pbf \
#             --output /var/smartmet/osm/scandinavia.pmtiles \
#             --config tilemaker-config.json \
#             --process tilemaker-process.lua
#
#   # Or use Planetiler for global simplified tiles:
#   java -jar planetiler.jar \
#        --download --area=planet \
#        --output=/var/smartmet/osm/global.pmtiles
#
# Resolution guidance:
#   scandinavia  — full OSM resolution, suitable for zoom 0–16
#   global       — simplified planet, suitable for zoom 0–8 (≈1 km/px)

# Number of leaf directories to cache per file (each is ~tens of KB after
# decompression). Increase for files with many zoom levels.
leaf_cache_size = 1024;

sources:
{
  scandinavia:
  {
    file = "/var/smartmet/osm/scandinavia.pmtiles";
  };

  global:
  {
    file = "/var/smartmet/osm/global.pmtiles";
  };
};
